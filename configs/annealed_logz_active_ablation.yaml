seed: 0
device: cuda

output_dir: ablation_runs/annealed_logz_active

checkpoint_path: runs/20260426_084857_fmnist/checkpoint.pt

# Ablation dataloading
batch_size: 256
eval_batch_size: 512
num_workers: 2

# Active set selection
active_lambda_threshold: 0.0
active_top_k:

# Number of independent chains, each initialized from P0.
num_prior_chains: 5

# Annealing grid
mode: annealed
num_betas: 21
beta_schedule: quadratic   # linear, quadratic, sqrt, cosine

# Dynamics at each beta
steps_per_beta: 2000
eval_samples_per_beta: 1
steps_between_eval_samples: 0

# Primal LR schedule for the annealed chain
sgld_lr: 1.0e-6
min_sgld_lr: 0.0
warmup_steps: 0

# Langevin noise
noise_scale: 0.001
grad_clip_norm: -1

# Usually false: beta=0 should be a raw prior sample.
train_at_beta_zero: false

# W&B logging
wandb_enabled: true
wandb_project: maxent-feasible-fmnist
wandb_entity:
wandb_group:
wandb_mode: online
wandb_tags:
  - annealed-logz
  - active-set
  - fixed-lambda
